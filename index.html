<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Egress Window Calculator (Canada)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
    }

    .egress-calculator {
      background-color: #fff;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
      margin: 10px auto;
    }

    .egress-calculator img {
      display: block;
      margin: 0 auto 10px;
      max-width: 100%;
      height: auto;
    }

    .egress-calculator h2 {
      color: #1d446b;
      text-align: center;
      font-size: 18px;
    }

    .egress-calculator p.definition {
      font-size: 12px;
      color: #333;
      margin-top: 5px;
      text-align: center;
    }

    .egress-calculator label {
      margin-top: 5px;
      font-weight: bold;
      display: block;
      font-size: 14px;
    }

    .egress-calculator input,
    .egress-calculator select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .egress-calculator button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background-color: #1d446b;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    .egress-calculator button:hover {
      background-color: #c5b282;
    }

    .egress-calculator .result {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      background-color: #eef6f9;
      border-left: 5px solid #1d446b;
      font-size: 13px;
    }

    .egress-calculator .result span {
      display: block;
      margin-top: 5px;
    }

    @media (max-width: 400px) {
      .egress-calculator input,
      .egress-calculator select,
      .egress-calculator button {
        font-size: 14px;
      }

      .egress-calculator .result {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="egress-calculator">
    <img src="images/Logo.png" alt="JELD-WEN Logo" width="200" height="70" />
    <h2 id="title">Canadian Egress Window Calculator</h2>
    <p class="definition" id="definition"></p>

    <label for="windowType" id="windowTypeLabel">Window Type:</label>
    <select id="windowType">
      <option value="" disabled selected>Select a window type</option>
      <option value="Casement">Casement</option>
      <option value="Slider">Slider</option>
      <option value="Single-hung">Single Hung</option>
      <option value="Awning">Awning</option>
      <option value="Fixed">Fixed</option>
    </select>

    <div id="sizeFields">

    <div id="seriesRow" style="display:none">
      <label for="series" id="seriesLabel">Series:</label>
      <select id="series"></select>
    </div>

    <div id="litesRow" style="display:none">
      <label for="lites" id="litesLabel">Number of operable lites:</label>
      <select id="lites">
        <option value="2">Standard Slider Even Sash</option>
      </select>
    </div>

    <label for="width" id="widthLabel">Width (inches):</label>
    <input type="number" id="width" min="0" step="0.1" />

    <label for="height" id="heightLabel">Height (inches):</label>
    <input type="number" id="height" min="0" step="0.1" />

    <label for="unit" id="unitLabel">Unit:</label>
    <select id="unit">
      <option value="in">Inches</option>
      <option value="cm">Centimeters</option>
    </select>
    </div><!-- /sizeFields -->

    <div class="result" id="egress-result"></div>
  </div>

  <script>
    // ---------- Constants (NBC 2020) ----------
    const IN_TO_MM = 25.4;
    const MM_TO_IN = 1 / IN_TO_MM;
    const MIN_AREA_M2 = 0.35;
    const MIN_AREA_MM2 = MIN_AREA_M2 * 1_000_000; // 350,000 mm²
    const MIN_DIM_MM = 380;

    // Casement size cap: 36" wide x 78" tall
    const CASEMENT_MAX_WIDTH_MM = 36 * IN_TO_MM;
    const CASEMENT_MAX_HEIGHT_MM = 78 * IN_TO_MM;

    // Slider size cap: 144" wide x 72" tall
    const SLIDER_MAX_WIDTH_MM = 144 * IN_TO_MM;
    const SLIDER_MAX_HEIGHT_MM = 72 * IN_TO_MM;

    // Hung size cap: 144" wide x 80" tall (single-hung)
    const HUNG_MAX_WIDTH_MM = 144 * IN_TO_MM;
    const HUNG_MAX_HEIGHT_MM = 80 * IN_TO_MM;

    // Series options available for each window type.
    // Additional series (with their own formulas) can be added later.
    const SERIES_OPTIONS = {
      casement: ['JWC8500'],
      slider: ['JWC7500', 'ES3500', 'JWC6500', 'Builder Series'],
      'single-hung': ['JWC7500'],
    };

    // Series for which an egress formula is not yet defined.
    // Keyed by `${type}|${series}` since the same series name (e.g. JWC7500)
    // may have a formula for one window type but not another.
    // Selecting one of these will display a notice instead of calculating.
    const SERIES_NO_FORMULA = new Set([
      'slider|ES3500',
      'slider|JWC6500',
      'slider|Builder Series',
      'casement|JWC8500',
      'single-hung|JWC7500',
    ]);

    // Window types that cannot be used as egress windows.
    // For these we only show a disclaimer and do not collect dimensions.
    const NON_EGRESS_TYPES = new Set(['awning', 'fixed']);

    // Debounce helper
    function debounce(func, delay) {
      let timeout;
      return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), delay);
      };
    }

    // Query elements once
    const widthEl = document.getElementById('width');
    const heightEl = document.getElementById('height');
    const typeEl = document.getElementById('windowType');
    const unitEl = document.getElementById('unit');
    const seriesEl = document.getElementById('series');
    const seriesRow = document.getElementById('seriesRow');
    const litesEl = document.getElementById('lites');
    const litesRow = document.getElementById('litesRow');
    const widthLabelEl = document.getElementById('widthLabel');
    const heightLabelEl = document.getElementById('heightLabel');
    const sizeFieldsEl = document.getElementById('sizeFields');
    const resultEl = document.getElementById('egress-result');

    const urlParams = new URLSearchParams(window.location.search);
    const lang = urlParams.get('lang') === 'fr' ? 'fr' : 'en';

    const translations = {
      en: {
        title: "Canadian Egress Window Calculator",
        definition:
          "<strong>Note:</strong> According to the <em>National Building Code of Canada 2025</em>, bedroom egress windows must provide an <strong>unobstructed opening</strong> of at least <strong>0.35 m² (3.77 ft²)</strong>, with no dimension less than <strong>380 mm (15 inches)</strong> in height or width.",
        windowTypeLabel: "Window Type:",
        widthLabelIn: "Width (inches):",
        heightLabelIn: "Height (inches):",
        widthLabelCm: "Width (cm):",
        heightLabelCm: "Height (cm):",
        unitLabel: "Unit:",
        seriesLabel: "Series:",
        litesLabel: "Number of operable lites:",
        selectWindowType: "Please select a window type.",
        enterDimensions: "Please enter a valid width and height (greater than 0).",
        casementTooLarge: "❌ Casement windows cannot exceed 36\" wide × 78\" tall (914 mm × 1981 mm).",
        sliderTooLarge: "❌ Slider windows cannot exceed 144\" wide × 72\" tall (3658 mm × 1829 mm).",
        hungTooLarge: "❌ Hung windows cannot exceed 144\" wide × 80\" tall (3658 mm × 2032 mm).",
        noFormula: "ℹ️ Egress formula for this series is not yet available. Please contact JELD-WEN for guidance.",
        nonEgressDisclaimer: "⚠️ This window type cannot be used as an egress window. Awning and Fixed windows do not provide a code-compliant unobstructed opening under NBC 2025 and must not be specified for bedroom egress.",
        windowType: "Window Type",
        effectiveOpening: "Effective Opening",
        clearArea: "Clear Opening Area",
        passes: "✅ PASS — Meets Canadian egress requirements (NBC 2025).",
        guidance:
          "For guidance only—check with your local municipality for specific requirements.",
        fails: "❌ FAIL — Does NOT meet Canadian egress requirements (NBC 2025).",
      },
      fr: {
        title: "Calculateur de Fenêtre de Sortie (Canada)",
        definition:
          "<strong>Remarque :</strong> Selon le <em>Code national du bâtiment du Canada 2025</em>, les fenêtres de sortie doivent offrir une <strong>ouverture dégagée</strong> d'au moins <strong>0,35 m² (3,77 ft²)</strong>, sans dimension inférieure à <strong>380 mm (15 pouces)</strong> en hauteur ou en largeur.",
        windowTypeLabel: "Type de Fenêtre :",
        widthLabelIn: "Largeur (pouces) :",
        heightLabelIn: "Hauteur (pouces) :",
        widthLabelCm: "Largeur (cm) :",
        heightLabelCm: "Hauteur (cm) :",
        unitLabel: "Unité :",
        seriesLabel: "Série :",
        litesLabel: "Nombre de vantaux ouvrants :",
        selectWindowType: "Veuillez sélectionner un type de fenêtre.",
        enterDimensions: "Veuillez entrer une largeur et une hauteur valides (supérieures à 0).",
        casementTooLarge: "❌ Les fenêtres à battant ne peuvent dépasser 36 po de largeur × 78 po de hauteur (914 mm × 1981 mm).",
        sliderTooLarge: "❌ Les fenêtres coulissantes ne peuvent dépasser 144 po de largeur × 72 po de hauteur (3658 mm × 1829 mm).",
        hungTooLarge: "❌ Les fenêtres à guillotine ne peuvent dépasser 144 po de largeur × 80 po de hauteur (3658 mm × 2032 mm).",
        noFormula: "ℹ️ La formule de sortie pour cette série n'est pas encore disponible. Veuillez contacter JELD-WEN.",
        nonEgressDisclaimer: "⚠️ Ce type de fenêtre ne peut pas être utilisé comme fenêtre de sortie. Les fenêtres à auvent et fixes ne fournissent pas une ouverture dégagée conforme au CNB 2025 et ne doivent pas être spécifiées pour une sortie de chambre.",
        windowType: "Type de Fenêtre",
        effectiveOpening: "Ouverture Effective",
        clearArea: "Surface d'Ouverture Dégagée",
        passes: "✅ CONFORME — Répond aux exigences de sortie canadiennes (NBC 2025).",
        guidance:
          "À titre indicatif seulement — vérifiez auprès de votre municipalité locale.",
        fails: "❌ NON CONFORME — Ne répond PAS aux exigences de sortie canadiennes (NBC 2025).",
      },
    };

    function applyLanguage() {
      const t = translations[lang];
      document.getElementById('title').textContent = t.title;
      document.getElementById('definition').innerHTML = t.definition;
      document.getElementById('windowTypeLabel').textContent = t.windowTypeLabel;
      document.getElementById('unitLabel').textContent = t.unitLabel;
      document.getElementById('seriesLabel').textContent = t.seriesLabel;
      document.getElementById('litesLabel').textContent = t.litesLabel;
      applyUnitLabels();
    }

    function applyUnitLabels() {
      const t = translations[lang];
      const isCm = unitEl.value === 'cm';
      widthLabelEl.textContent = isCm ? t.widthLabelCm : t.widthLabelIn;
      heightLabelEl.textContent = isCm ? t.heightLabelCm : t.heightLabelIn;
    }

    function updateOptionalFields() {
      const type = typeEl.value.toLowerCase();
      const isNonEgress = NON_EGRESS_TYPES.has(type);

      // Hide size inputs and series/lites for non-egress types — we only show a disclaimer.
      sizeFieldsEl.style.display = isNonEgress ? 'none' : '';
      litesRow.style.display = (!isNonEgress && type === 'slider') ? '' : 'none';

      const options = isNonEgress ? [] : (SERIES_OPTIONS[type] || []);
      seriesRow.style.display = options.length ? '' : 'none';
      // Repopulate options for the current window type
      seriesEl.innerHTML = '';
      for (const opt of options) {
        const o = document.createElement('option');
        o.value = opt;
        o.textContent = opt;
        seriesEl.appendChild(o);
      }
    }

    function capitalizeWords(str) {
      return str
        .split('-')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
    }

    function toMm(value, unit) {
      return unit === 'cm' ? value * 10 : value * IN_TO_MM;
    }

    function formatDim(mm, unit) {
      return unit === 'cm'
        ? (mm / 10).toFixed(1) + ' cm'
        : (mm * MM_TO_IN).toFixed(1) + '"';
    }

    function egressCalculate() {
      const widthInput = Number(widthEl.value);
      const heightInput = Number(heightEl.value);
      const type = typeEl.value.toLowerCase();
      const unit = unitEl.value;
      const t = translations[lang];

      if (!type) {
        resultEl.textContent = t.selectWindowType;
        return;
      }

      // Non-egress window types: show disclaimer only, no calculation.
      if (NON_EGRESS_TYPES.has(type)) {
        resultEl.innerHTML =
          `<strong>${t.windowType}:</strong> ${capitalizeWords(type)}<br>` +
          `<span style='color:#b00020'>${t.nonEgressDisclaimer}</span>`;
        return;
      }

      if (
        !Number.isFinite(widthInput) || widthInput <= 0 ||
        !Number.isFinite(heightInput) || heightInput <= 0
      ) {
        resultEl.textContent = t.enterDimensions;
        return;
      }

      const widthMm = toMm(widthInput, unit);
      const heightMm = toMm(heightInput, unit);

      // Short-circuit if the selected (type, series) combination has no defined formula yet.
      const selectedSeries = seriesEl.value;
      if (selectedSeries && SERIES_NO_FORMULA.has(`${type}|${selectedSeries}`)) {
        resultEl.innerHTML =
          `<strong>${t.windowType}:</strong> ${capitalizeWords(type)} (${selectedSeries})<br>` +
          `<span style='color:#1d446b'>${t.noFormula}</span>`;
        return;
      }

      if (
        type === 'casement' &&
        (widthMm > CASEMENT_MAX_WIDTH_MM || heightMm > CASEMENT_MAX_HEIGHT_MM)
      ) {
        resultEl.innerHTML =
          `<strong>${t.windowType}:</strong> ${capitalizeWords(type)}<br>` +
          `<span style='color:red'>${t.casementTooLarge}</span>`;
        return;
      }

      if (
        type === 'slider' &&
        (widthMm > SLIDER_MAX_WIDTH_MM || heightMm > SLIDER_MAX_HEIGHT_MM)
      ) {
        resultEl.innerHTML =
          `<strong>${t.windowType}:</strong> ${capitalizeWords(type)}<br>` +
          `<span style='color:red'>${t.sliderTooLarge}</span>`;
        return;
      }

      if (
        type === 'single-hung' &&
        (widthMm > HUNG_MAX_WIDTH_MM || heightMm > HUNG_MAX_HEIGHT_MM)
      ) {
        resultEl.innerHTML =
          `<strong>${t.windowType}:</strong> ${capitalizeWords(type)}<br>` +
          `<span style='color:red'>${t.hungTooLarge}</span>`;
        return;
      }

      let effectiveWidthMm = widthMm;
      let effectiveHeightMm = heightMm;

      if (type === 'slider') {
        const series = seriesEl.value;
        if (series === 'JWC7500') {
          // JWC7500 Slider EGRESS (even sash only)
          // Unobstructed width  = (width / 2) - 142.5 mm
          // Unobstructed height = height - 111.5 mm
          effectiveWidthMm = Math.max(0, (widthMm / 2) - 142.5);
          effectiveHeightMm = Math.max(0, heightMm - 111.5);
        } else {
          const litesRaw = Math.floor(Number(litesEl.value));
          const lites = Number.isFinite(litesRaw) && litesRaw >= 2 ? litesRaw : 2;
          effectiveWidthMm = widthMm / lites;
        }
      } else if (type === 'casement') {
        // Default casement allowance (75 mm) to account for sash frame.
        // Replace with series-specific formula when provided.
        const allowanceMm = 75;
        effectiveWidthMm = Math.max(0, widthMm - allowanceMm);
      }

      const areaMm2 = effectiveWidthMm * effectiveHeightMm;
      const areaM2 = areaMm2 / 1_000_000;
      const areaIn2 = areaMm2 * MM_TO_IN * MM_TO_IN;
      const areaFt2 = areaIn2 / 144;

      const meetsArea = areaMm2 >= MIN_AREA_MM2;
      const meetsDimension =
        effectiveWidthMm >= MIN_DIM_MM && effectiveHeightMm >= MIN_DIM_MM;

      let complianceMessage = '';
      if (meetsArea && meetsDimension) {
        complianceMessage =
          `<span style='color:green'>${t.passes}</span><br>` +
          `<span>${t.guidance}</span>`;
      } else {
        complianceMessage = `<span style='color:red'>${t.fails}</span>`;
      }

      resultEl.innerHTML =
        `<strong>${t.windowType}:</strong> ${capitalizeWords(type)}<br>` +
        `<strong>${t.effectiveOpening}:</strong> ${formatDim(effectiveWidthMm, unit)} x ${formatDim(effectiveHeightMm, unit)}<br>` +
        `<strong>${t.clearArea}:</strong> ${areaM2.toFixed(3)} m² (${areaFt2.toFixed(2)} ft²)<br>` +
        complianceMessage;
    }

    applyLanguage();
    updateOptionalFields();

    // Attach debounced listeners
    widthEl.addEventListener('input', debounce(egressCalculate, 300));
    heightEl.addEventListener('input', debounce(egressCalculate, 300));
    litesEl.addEventListener('change', egressCalculate);
    typeEl.addEventListener('change', () => { updateOptionalFields(); egressCalculate(); });
    unitEl.addEventListener('change', () => { applyUnitLabels(); egressCalculate(); });
    seriesEl.addEventListener('change', egressCalculate);
  </script>
</body>
</html>
